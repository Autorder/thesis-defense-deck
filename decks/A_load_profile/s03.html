<!doctype html><html><head><meta charset="utf-8"><title>Four intra-day shapes</title><style>
  :root{
    --page-bg:#e9ebe6;--panel:#fff;--page-fg:#1b2622;--cap-fg:#5b665f;--hair:#d3d8d0;
    --pine:#12514A;--teal:#1F7A5A;--gold:#9C6A15;--amber:#E8A310;--red:#B23A3A;--blue:#2a5a7a;
    --ground:#f4f5f3;--ink:#16211e;--mut:#68726b;--rowbd:#e4e8e2;
  }
  @media (prefers-color-scheme:dark){:root{--page-bg:#12161a;--panel:#1b2027;--page-fg:#e7ebe6;--cap-fg:#9aa39c;--hair:#2a323a;}}
  :root[data-theme="dark"]{--page-bg:#12161a;--panel:#1b2027;--page-fg:#e7ebe6;--cap-fg:#9aa39c;--hair:#2a323a;}
  :root[data-theme="light"]{--page-bg:#e9ebe6;--panel:#fff;--page-fg:#1b2622;--cap-fg:#5b665f;--hair:#d3d8d0;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--page-bg);color:var(--page-fg);font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1120px;margin:0 auto;padding:36px 24px 80px;}
  header.top .ey{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);font-weight:700;}
  header.top h1{font-size:clamp(1.4rem,2.6vw,1.9rem);margin:.3em 0 .2em;text-wrap:balance;}
  header.top p{margin:.2em 0;color:var(--cap-fg);max-width:70ch;line-height:1.55;}
  .slidewrap{margin:30px 0;}
  .slidewrap>.lbl{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;}
  .slidewrap>.lbl b{font-size:1rem;} .slidewrap>.lbl .st{font-size:.85rem;color:var(--cap-fg);}
  .slidewrap>.lbl .tag{font-size:.72rem;font-weight:700;color:#fff;border-radius:20px;padding:2px 10px;letter-spacing:.04em;}
  .tag.new{background:var(--teal);} .tag.fix{background:var(--amber);}
  .slide{container-type:inline-size;position:relative;width:100%;aspect-ratio:16/9;background:var(--ground);color:var(--ink);border-radius:10px;box-shadow:0 6px 26px rgba(0,0,0,.16);overflow:hidden;border:1px solid rgba(0,0,0,.06);}
  .pad{position:absolute;inset:0;padding:3.4cqw 4.6cqw;display:flex;flex-direction:column;}
  .kick{font-size:1.55cqw;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);font-weight:800;}
  .snum{position:absolute;top:3.6cqw;right:4.2cqw;width:5cqw;height:5cqw;border-radius:50%;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:2.4cqw;}
  .ttl{font-size:3.7cqw;line-height:1.05;font-weight:800;color:var(--pine);margin:.4cqw 0 0;max-width:88%;}
  .sub{font-size:1.6cqw;color:var(--mut);margin:.5cqw 0 0;}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:1cqw;min-height:0;}

  /* chart cards */
  .ch{background:#fff;border:1px solid var(--rowbd);border-radius:1cqw;padding:.7cqw;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;flex-direction:column;min-height:0;}
  .ch img{width:100%;height:100%;object-fit:contain;flex:1;min-height:0;}
  .ch .cl{font-size:1.35cqw;font-weight:800;color:var(--pine);text-align:center;margin-top:.35cqw;line-height:1.1;}
  .ch .cl small{display:block;font-size:1.05cqw;font-weight:600;color:var(--mut);}
  .charts3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.1cqw;flex:1;min-height:0;margin-top:1cqw;}
  .charts4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1cqw;flex:1;min-height:0;margin-top:1cqw;}
  .gwrap{background:#fff;border:1px solid var(--rowbd);border-radius:1.3cqw;padding:.7cqw;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.05);height:100%;min-height:0;}
  .gwrap img{width:100%;height:100%;object-fit:contain;}
  .split{flex:1;display:grid;gap:1.6cqw;align-items:center;min-height:0;margin-top:1cqw;}
  .split.c6{grid-template-columns:1.22fr 1fr;}
  .split.c7{grid-template-columns:1.45fr .8fr;}
  .split.c8{grid-template-columns:1.3fr .82fr;}
  .col{display:flex;flex-direction:column;gap:1cqw;min-height:0;}

  /* reason cards */
  .cards{display:grid;gap:1.3cqw;}
  .g2{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr 1fr;}
  .rc{background:#fff;border:1px solid var(--rowbd);border-left:.8cqw solid var(--accent,var(--pine));border-radius:1.2cqw;padding:1.15cqw 1.5cqw;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .rc h5{font-size:1.85cqw;font-weight:800;color:var(--pine);margin:0;line-height:1.08;}
  .rc p{font-size:1.45cqw;color:#33403a;margin:.5cqw 0 0;line-height:1.3;}
  .rc.teal{--accent:#1f7a5a;} .rc.gold{--accent:#9c6a15;} .rc.red{--accent:#b23a3a;} .rc.blue{--accent:#2a5a7a;} .rc.pine{--accent:#12514A;}
  .rc.teal h5{color:#1f7a5a;} .rc.red h5{color:#b23a3a;} .rc.gold h5{color:#9c6a15;} .rc.blue h5{color:#2a5a7a;}

  /* formula box (slide 4) */
  .fbox{background:var(--pine);border-radius:1.4cqw;padding:1.5cqw 1.8cqw;color:#eaf4f0;font-family:ui-monospace,Menlo,Consolas,monospace;display:flex;flex-direction:column;justify-content:center;gap:.9cqw;}
  .fbox .fl{font-size:1.62cqw;line-height:1.35;}
  .fbox .fl b{color:#f4cd78;font-weight:700;}
  .fbox .fh{font-size:1.3cqw;font-weight:800;color:#f4cd78;text-transform:uppercase;letter-spacing:.08em;font-family:system-ui;}
  table.t{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;}
  table.t th{font-size:1.4cqw;color:var(--mut);text-transform:uppercase;letter-spacing:.03em;font-weight:700;text-align:left;padding:.75cqw .7cqw;border-bottom:.3cqw solid var(--pine);}
  table.t th:last-child{text-align:right;}
  table.t td{font-size:1.55cqw;padding:.82cqw .7cqw;text-align:left;border-bottom:.16cqw solid #dde3dd;color:var(--ink);font-weight:700;}
  table.t td:last-child{text-align:right;color:var(--pine);font-variant-numeric:tabular-nums;}
  table.t td.hl{color:var(--red);}
  .tnote{font-size:1.2cqw;color:var(--mut);margin-top:.6cqw;line-height:1.3;}

  .strip{margin-top:auto;background:var(--pine);color:#f4cd78;border-radius:1.4cqw;padding:1.3cqw 2cqw;font-size:1.68cqw;font-weight:800;line-height:1.32;}
  .strip b{color:#fff;} .strip.warn{background:#7a3b1a;color:#ffd9a8;} .strip.warn b{color:#fff;}

  /* cover */
  .cover{background:linear-gradient(135deg,#0d3f39,#12514A 55%,#17635a);color:#fff;}
  .cover .pad{justify-content:center;}
  .cover .gtag{font-size:1.55cqw;letter-spacing:.14em;text-transform:uppercase;color:#bfe0d6;font-weight:800;}
  .cover h2{font-size:4.8cqw;font-weight:800;margin:1.1cqw 0 0;}
  .qbox{margin-top:2.2cqw;display:flex;gap:1.8cqw;align-items:flex-start;}
  .qbox .q{width:5.2cqw;height:5.2cqw;border-radius:50%;background:var(--amber);color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:2.9cqw;font-weight:800;}
  .qbox .qt .ql{font-size:1.45cqw;font-weight:800;color:#f4cd78;text-transform:uppercase;letter-spacing:.08em;}
  .qbox .qt p{margin:.5cqw 0 0;font-size:2.05cqw;line-height:1.3;font-weight:600;color:#eaf4f0;max-width:94%;}
  .brief{margin-top:2cqw;background:rgba(255,255,255,.09);border-left:.6cqw solid var(--amber);border-radius:1cqw;padding:1.3cqw 1.7cqw;}
  .brief .bl{font-size:1.35cqw;font-weight:800;color:#f4cd78;text-transform:uppercase;letter-spacing:.06em;}
  .brief p{margin:.5cqw 0 0;font-size:1.62cqw;line-height:1.35;color:#eaf4f0;}

  .cap{margin-top:12px;font-size:.9rem;color:var(--cap-fg);line-height:1.55;background:var(--panel);border:1px solid var(--hair);border-radius:8px;padding:13px 16px;}
  .cap b{color:var(--page-fg);}
  footer{margin-top:44px;color:var(--cap-fg);font-size:.85rem;text-align:center;line-height:1.6;}


/* ---- v3 render override: one slide, exactly 1920x1080 ---- */
html,body{margin:0;padding:0;width:1920px;height:1080px;overflow:hidden;background:#ffffff;}
#rstage{width:1920px;height:1080px;position:relative;}
#rstage .slide{width:1920px;height:1080px;border-radius:0;box-shadow:none;border:0;margin:0;}
#hud,.slidewrap>.lbl{display:none !important;}
