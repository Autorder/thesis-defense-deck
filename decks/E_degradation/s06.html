<!doctype html><html><head><meta charset="utf-8"><title>Decade evolution — independence &amp; savings</title><style>
  :root{
    --page-bg:#e9ebe6;--panel:#fff;--page-fg:#1b2622;--cap-fg:#5b665f;--hair:#d3d8d0;
    --pine:#12514A;--teal:#1F7A5A;--gold:#9C6A15;--amber:#E8A310;--red:#B23A3A;--blue:#2a5a7a;
    --ground:#f4f5f3;--ink:#16211e;--mut:#68726b;--rowbd:#e4e8e2;
  }
  @media (prefers-color-scheme:dark){:root{--page-bg:#12161a;--panel:#1b2027;--page-fg:#e7ebe6;--cap-fg:#9aa39c;--hair:#2a323a;}}
  :root[data-theme="dark"]{--page-bg:#12161a;--panel:#1b2027;--page-fg:#e7ebe6;--cap-fg:#9aa39c;--hair:#2a323a;}
  :root[data-theme="light"]{--page-bg:#e9ebe6;--panel:#fff;--page-fg:#1b2622;--cap-fg:#5b665f;--hair:#d3d8d0;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--page-bg);color:var(--page-fg);font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:1120px;margin:0 auto;padding:36px 24px 80px;}
  header.top .ey{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--teal);font-weight:700;}
  header.top h1{font-size:clamp(1.4rem,2.6vw,1.9rem);margin:.3em 0 .2em;text-wrap:balance;}
  header.top p{margin:.2em 0;color:var(--cap-fg);max-width:70ch;line-height:1.55;}
  .slidewrap{margin:30px 0;}
  .slidewrap>.lbl{display:flex;align-items:baseline;gap:10px;margin-bottom:9px;}
  .slidewrap>.lbl b{font-size:1rem;} .slidewrap>.lbl .st{font-size:.85rem;color:var(--cap-fg);}
  .slidewrap>.lbl .tag{font-size:.72rem;font-weight:700;color:#fff;border-radius:20px;padding:2px 10px;letter-spacing:.04em;}
  .tag.new{background:var(--teal);} .tag.fix{background:var(--amber);} .tag.ok{background:#7d8a82;}
  .slide{container-type:inline-size;position:relative;width:100%;aspect-ratio:16/9;background:var(--ground);color:var(--ink);border-radius:10px;box-shadow:0 6px 26px rgba(0,0,0,.16);overflow:hidden;border:1px solid rgba(0,0,0,.06);}
  .pad{position:absolute;inset:0;padding:3.3cqw 4.6cqw;display:flex;flex-direction:column;}
  .kick{font-size:1.7cqw;letter-spacing:.13em;text-transform:uppercase;color:var(--teal);font-weight:800;}
  .snum{position:absolute;top:3.8cqw;right:4.2cqw;width:5cqw;height:5cqw;border-radius:50%;background:var(--amber);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:2.4cqw;}
  .ttl{font-size:3.5cqw;line-height:1.05;font-weight:800;color:var(--pine);margin:.4cqw 0 0;max-width:88%;}
  .sub{font-size:1.5cqw;color:var(--mut);margin:.5cqw 0 0;}
  .body{flex:1;display:flex;flex-direction:column;justify-content:center;margin-top:1cqw;min-height:0;}

  table.t{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;}
  table.t th{font-size:1.5cqw;color:var(--mut);text-transform:uppercase;letter-spacing:.03em;font-weight:700;text-align:center;padding:.9cqw .6cqw;border-bottom:.3cqw solid var(--pine);}
  table.t th:first-child{text-align:left;}
  table.t td{font-size:2cqw;padding:1cqw .6cqw;text-align:center;border-bottom:.16cqw solid #dde3dd;color:var(--ink);font-weight:700;}
  table.t td:first-child{text-align:left;font-weight:800;color:var(--pine);font-size:1.7cqw;}
  table.t td.good{color:var(--teal);} table.t td.bad{color:var(--red);} table.t td.mid{color:var(--gold);}
  table.t tr.best td{background:#e7f2ec;} table.t tr.worst td{background:#f7ecec;}
  .tnote{font-size:1.5cqw;color:var(--mut);margin-top:.7cqw;line-height:1.35;}

  .cards{display:grid;gap:1.3cqw;margin-top:1.3cqw;}
  .g2{grid-template-columns:1fr 1fr;} .g3{grid-template-columns:1fr 1fr 1fr;} .g4c{grid-template-columns:1fr 1fr 1fr 1fr;}
  .rc{background:#fff;border:1px solid var(--rowbd);border-left:.75cqw solid var(--accent,var(--pine));border-radius:1.2cqw;padding:1.2cqw 1.55cqw;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .rc h5{font-size:2.05cqw;font-weight:800;color:var(--pine);margin:0;line-height:1.1;}
  .rc p{font-size:1.62cqw;color:#33403a;margin:.5cqw 0 0;line-height:1.34;}
  .rc.teal{--accent:#1f7a5a;} .rc.gold{--accent:#9c6a15;} .rc.red{--accent:#b23a3a;} .rc.blue{--accent:#2a5a7a;} .rc.pine{--accent:#12514A;}
  .rc.teal h5{color:#1f7a5a;} .rc.red h5{color:#b23a3a;} .rc.gold h5{color:#9c6a15;} .rc.blue h5{color:#2a5a7a;}

  .strip{margin-top:auto;background:var(--pine);color:#f4cd78;border-radius:1.4cqw;padding:1.45cqw 2.2cqw;font-size:1.98cqw;font-weight:800;line-height:1.32;}
  .strip b{color:#fff;}

  /* equation box (slide 2) */
  .eqbox{background:#0f2e2a;border-radius:1.3cqw;padding:1.5cqw 1.9cqw;display:grid;grid-template-columns:1fr 1fr;gap:.6cqw 2.4cqw;}
  .eqbox .eq{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:1.78cqw;color:#eafaf4;line-height:1.5;}
  .eqbox .eq b{color:#7fe0c4;} .eqbox .eq .cm{color:#7f9a92;font-style:italic;}

  /* graph card + 2x2 grid */
  .gcard{background:#fff;border:1px solid var(--rowbd);border-radius:1.2cqw;padding:.7cqw;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 3px rgba(0,0,0,.05);}
  .gcard img{width:100%;height:100%;object-fit:contain;display:block;}
  .grid4{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1cqw;min-height:0;}
  .grid4 .gcard{min-height:0;}
  .grid2{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:1.5cqw;min-height:0;margin-top:.8cqw;}
  .grid2 .gcard{min-height:0;padding:1cqw;}
  .l3{flex:1;display:grid;grid-template-columns:1.62fr 1fr;gap:1.6cqw;align-items:stretch;min-height:0;margin-top:.8cqw;}
  .l3 .colcards{display:flex;flex-direction:column;gap:1.1cqw;justify-content:center;}

  .cap{margin-top:12px;font-size:.9rem;color:var(--cap-fg);line-height:1.55;background:var(--panel);border:1px solid var(--hair);border-radius:8px;padding:13px 16px;}
  .cap b{color:var(--page-fg);} .cap ul{margin:.5em 0 0;padding-inline-start:1.2em;} .cap li{margin:.28em 0;}
  footer{margin-top:44px;color:var(--cap-fg);font-size:.85rem;text-align:center;line-height:1.6;}

  /* cover */
  .cover{background:linear-gradient(135deg,#0d3f39,#12514A 55%,#17635a);color:#fff;}
  .cover .pad{justify-content:center;}
  .cover .gtag{font-size:1.55cqw;letter-spacing:.14em;text-transform:uppercase;color:#bfe0d6;font-weight:800;}
  .cover h2{font-size:4.8cqw;font-weight:800;margin:1.1cqw 0 0;}
  .qbox{margin-top:2.2cqw;display:flex;gap:1.9cqw;align-items:flex-start;}
  .qbox .q{width:5.2cqw;height:5.2cqw;border-radius:50%;background:var(--amber);color:#fff;flex:none;display:flex;align-items:center;justify-content:center;font-size:2.9cqw;font-weight:800;}
  .qbox .qt .ql{font-size:1.45cqw;font-weight:800;color:#f4cd78;text-transform:uppercase;letter-spacing:.08em;}
  .qbox .qt p{margin:.5cqw 0 0;font-size:2.05cqw;line-height:1.3;font-weight:600;color:#eaf4f0;max-width:94%;}
  .brief{margin-top:2cqw;background:rgba(255,255,255,.09);border-left:.6cqw solid var(--amber);border-radius:1cqw;padding:1.3cqw 1.7cqw;}
  .brief .bl{font-size:1.45cqw;font-weight:800;color:#f4cd78;text-transform:uppercase;letter-spacing:.06em;}
  .brief p{margin:.5cqw 0 0;font-size:1.8cqw;line-height:1.4;color:#eaf4f0;}

  /* slide 2 — top-align + slightly tighter so eqbox+3 cards+strip fit */
  #s2 .body{justify-content:flex-start;margin-top:.7cqw}
  #s2 .eqbox{padding:1.25cqw 1.8cqw;gap:.4cqw 2.2cqw}
  #s2 .eqbox .eq{font-size:1.68cqw;line-height:1.42}
  #s2 .cards{margin-top:1cqw;gap:1.1cqw}
  #s2 .rc{padding:1.05cqw 1.4cqw}
  #s2 .rc h5{font-size:1.9cqw}
  #s2 .rc p{font-size:1.5cqw;line-height:1.3}
  #s2 .strip{font-size:1.85cqw}

  /* slide 8 — dense (has spare room at bottom, bumped up) */
  #s8 .ttl{font-size:3.2cqw}
  #s8 .body{justify-content:flex-start;margin-top:.7cqw}
  #s8 table.t th{font-size:1.45cqw;padding:.75cqw .5cqw}
  #s8 table.t td{font-size:1.92cqw;padding:.9cqw .5cqw}
  #s8 table.t td:first-child{font-size:1.68cqw}
  #s8 .rc{padding:1.05cqw 1.4cqw}
  #s8 .rc h5{font-size:1.82cqw}
  #s8 .rc p{font-size:1.5cqw}
  #s8 .strip{font-size:1.78cqw;padding:1.25cqw 1.9cqw}


/* ---- v3 render override: one slide, exactly 1920x1080 ---- */
html,body{margin:0;padding:0;width:1920px;height:1080px;overflow:hidden;background:#ffffff;}
#rstage{width:1920px;height:1080px;position:relative;}
#rstage .slide{width:1920px;height:1080px;border-radius:0;box-shadow:none;border:0;margin:0;}
#hud,.slidewrap>.lbl{display:none !important;}
