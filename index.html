<!doctype html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sizing Battery Storage for Energy Independence in Israeli Homes — Defense</title>
<style>
  :root{
    --pine:#12514A; --teal:#1F7A5A; --gold:#9C6A15; --amber:#E8A310; --red:#B23A3A;
    --bg:#0e1311; --panel:#161d1a; --ink:#e9efeb; --mut:#93a29a; --line:#26302b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif;}

  #app{min-height:100%;display:flex;flex-direction:column;}
  #stagewrap{flex:none;display:flex;align-items:center;justify-content:center;}
  #stage{position:relative;width:100%;max-width:calc(100vh * 16 / 9);aspect-ratio:16/9;
    background:#fff;overflow:hidden;}
  #stage iframe{position:absolute;top:0;left:0;width:1920px;height:1080px;border:0;
    transform-origin:top left;background:#fff;}
  /* click zones: the slide is an iframe, so clicks need a layer above it */
  .zone{position:absolute;top:0;bottom:0;z-index:5;cursor:pointer;}
  #zprev{left:0;width:22%;} #znext{left:22%;right:0;}
  .zone .hint{position:absolute;top:50%;transform:translateY(-50%);font-size:34px;
    color:#12514A;background:rgba(255,255,255,.82);border-radius:50%;width:56px;height:56px;
    display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s;
    box-shadow:0 2px 10px rgba(0,0,0,.18);font-weight:700;}
  #zprev .hint{left:14px} #znext .hint{right:14px}
  .zone:hover .hint{opacity:.9}

  body.present #app{height:100vh;}
  body.present #stagewrap{flex:1;background:#000;}
  body.present #review{display:none;}
  /* in the exam link the bar shows on load, fades away, and returns on any mouse move */
  body.present #bar{opacity:1;}
  body.present.idle #bar{opacity:0;}
  body.present #bar:hover{opacity:1;}

  body.review #stagewrap{padding:18px 18px 0;}
  #review{max-width:calc(100vh * 16 / 9);width:100%;margin:0 auto;padding:14px 18px 80px;}

  /* two declared rows: controls never wrap, the deck links scroll sideways instead */
  #bar{position:fixed;left:0;right:0;bottom:0;z-index:40;display:flex;flex-direction:column;
    gap:8px;padding:9px 16px;background:rgba(10,14,12,.92);border-top:1px solid var(--line);
    backdrop-filter:blur(8px);transition:opacity .3s;}
  body.review #bar{border-top:2px solid var(--amber);}
  #barmain{display:flex;align-items:center;gap:14px;flex-wrap:nowrap;min-width:0;}
  #bar .nav{display:flex;gap:6px}
  #bar button,#bar a.btn{background:var(--panel);color:var(--ink);border:1px solid var(--line);
    border-radius:7px;padding:5px 11px;font-size:.85rem;font-weight:700;cursor:pointer;
    font-family:inherit;text-decoration:none;}
  #bar button:hover,#bar a.btn:hover{border-color:var(--teal);color:#fff}
  #bar .pos{font-size:.82rem;color:var(--mut);font-variant-numeric:tabular-nums;white-space:nowrap}
  #bar .ttl{font-size:.86rem;font-weight:700;flex:1 1 auto;min-width:0;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  #bar .role{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800;
    color:#0e1311;background:var(--amber);border-radius:20px;padding:3px 10px;white-space:nowrap}
  /* row 2 — one line, always. Overflow scrolls; the mask says there is more. */
  #jumps{display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;overscroll-behavior-x:contain;
    scrollbar-width:thin;scrollbar-color:#2f4038 transparent;padding-bottom:2px;}
  #jumps:empty{display:none}
  #jumps::-webkit-scrollbar{height:6px}
  #jumps::-webkit-scrollbar-thumb{background:#2f4038;border-radius:3px}
  #jumps::-webkit-scrollbar-track{background:transparent}
  #jumps.more-e{mask-image:linear-gradient(to right,#000 calc(100% - 46px),transparent);}
  #jumps.more-s{mask-image:linear-gradient(to left,#000 calc(100% - 46px),transparent);}
  #jumps.more-s.more-e{mask-image:linear-gradient(to right,transparent,#000 46px,
    #000 calc(100% - 46px),transparent);}
  #jumps a{display:inline-flex;align-items:center;gap:6px;background:#1b2521;color:var(--ink);
    border:1px solid var(--line);border-inline-start:3px solid var(--teal);border-radius:7px;
    padding:5px 11px;font-size:.82rem;font-weight:700;text-decoration:none;white-space:nowrap}
  #jumps a:hover{border-color:var(--amber);color:#fff}
  #jumps a b{color:var(--amber);font-size:.72rem;letter-spacing:.05em}
  #bar .keys{font-size:.72rem;color:var(--mut);white-space:nowrap}
  /* the mode has to read at a glance: dim = off, amber with a tick = on */
  #bar #modebtn{margin-inline-start:auto;flex:none;color:var(--mut);opacity:.72;}
  #bar #modebtn:hover{opacity:1;color:var(--ink);}
  body.review #bar #modebtn{opacity:1;color:var(--amber);border-color:var(--amber);
    background:rgba(232,163,16,.14);}
  #modebtn .tick{display:none;font-weight:900;}
  body.review #modebtn .tick{display:inline;}
  @media (max-width:820px){ #bar .keys{display:none} }
  @media (max-width:620px){ #bar .ttl{display:none} }
  @media (max-width:560px){ #bar .role{display:none} }

  .sc{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden;
    direction:rtl;}
  .sc>summary{cursor:pointer;list-style:none;padding:14px 20px;font-size:1.12rem;font-weight:800;
    display:flex;align-items:center;gap:10px;color:#cfe3db;}
  .sc>summary::-webkit-details-marker{display:none}
  .sc>summary::before{content:"\25B8";color:var(--amber);font-size:1rem;transition:transform .2s}
  .sc[open]>summary::before{transform:rotate(90deg)}
  .sc>summary .n{font-size:.72rem;font-weight:700;color:var(--mut);margin-inline-start:auto}
  .scbody{padding:4px 22px 20px}
  .warn{background:#3a1f1d;border:1px solid #5a2f2c;border-inline-start:4px solid var(--red);
    border-radius:9px;padding:13px 17px;font-size:1.05rem;line-height:1.7;color:#f3dcd9;margin:0 0 18px}
  .warn b{color:#ffb4ad}
  .notes{margin:-8px 0 18px;border:1px solid var(--line);border-radius:9px;background:#141b18;}
  .notes>summary{cursor:pointer;list-style:none;padding:8px 15px;font-size:.9rem;font-weight:700;
    color:var(--mut);display:flex;align-items:center;gap:8px;}
  .notes>summary::-webkit-details-marker{display:none}
  .notes>summary::before{content:"\25B8";color:var(--mut);font-size:.8rem;transition:transform .2s}
  .notes[open]>summary::before{transform:rotate(90deg)}
  .notes>div{padding:2px 17px 14px;font-size:.95rem;line-height:1.75;color:#a9bab2}
  /* the script is meant to be read, not skimmed — keep it large */
  .lines p{margin:0 0 .62em;font-size:1.42rem;line-height:1.95;color:#e6efea;text-wrap:pretty}
  .lines p b{color:#fff}
  .lines p em{font-style:normal;color:var(--amber)}

  /* ---------- slide menu ---------- */
  /* two panes: the decks on the right, the slides of the chosen deck on the left */
  #menu{position:fixed;left:0;right:0;bottom:43px;z-index:45;display:none;
    grid-template-columns:1fr 320px;direction:rtl;height:56vh;
    background:rgba(10,14,12,.975);border-top:1px solid var(--line);backdrop-filter:blur(10px)}
  body.menuopen #menu{display:grid}
  #mdecks{grid-column:2;border-inline-start:1px solid var(--line);overflow-y:auto}
  #mslides{grid-column:1;overflow-y:auto}
  #menu .grp{padding:12px 18px 6px;font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;
    color:var(--mut);font-weight:800;position:sticky;top:0;background:rgba(10,14,12,.985);z-index:2}
  #menu a{display:flex;align-items:center;gap:13px;padding:9px 18px;text-decoration:none;
    color:var(--ink);border-inline-start:3px solid transparent;cursor:pointer}
  #menu a:hover{background:#18211d}
  #menu a.on{border-inline-start-color:var(--amber);background:#1b2521}
  #menu a.cur{background:#1b2521}
  #menu .mn{font-size:.82rem;color:var(--mut);width:26px;font-variant-numeric:tabular-nums;flex:none}
  #menu .mr{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
    color:#0e1311;background:var(--amber);border-radius:20px;padding:2px 9px;white-space:nowrap;flex:none}
  #menu .mt{font-size:.95rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #mdecks .mt{font-weight:800}
  #mdecks .cnt{margin-inline-start:auto;font-size:.75rem;color:var(--mut);
    font-variant-numeric:tabular-nums;flex:none}
  #mdecks a.core .mt{color:#7fc9b4}

  .jump{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px;direction:rtl}
  .jump a{display:inline-flex;align-items:center;gap:7px;background:var(--panel);
    border:1px solid var(--line);border-inline-start:4px solid var(--teal);border-radius:9px;
    padding:8px 14px;color:var(--ink);text-decoration:none;font-size:.87rem;font-weight:700}
  .jump a:hover{border-color:var(--teal);background:#1b2521}
  .jump a.pending{border-inline-start-color:var(--mut);opacity:.55;pointer-events:none}
  .jump a .k{font-size:.7rem;font-weight:800;color:var(--amber);letter-spacing:.06em}

  #err{padding:40px;color:#ffb4ad;font-size:1rem;direction:rtl;text-align:center}
</style>
</head>
<body>
<div id="app">
  <div id="stagewrap"><div id="stage"></div></div>
  <div id="review"></div>
</div>


<div id="menu"><div id="mslides"></div><div id="mdecks"></div></div>

<div id="bar">
  <div id="barmain">
    <button id="menubtn" title="All slides (M)">&#9776;</button>
    <div class="nav">
      <button id="prev" title="Previous (&#8592;)">&lsaquo;</button>
      <button id="next" title="Next (&#8594;)">&rsaquo;</button>
    </div>
    <span class="pos" id="pos">&ndash; / &ndash;</span>
    <span class="role" id="role" hidden></span>
    <span class="ttl" id="ttl"></span>
    <span class="keys">&#8592; &#8594; &middot; F fullscreen</span>
    <a class="btn" id="tomain" href="#" hidden>main deck</a>
    <button id="modebtn" title="Toggle presenter script (S)">script<span class="tick">&nbsp;&#10003;</span></button>
  </div>
  <div id="jumps"></div>
</div>

<script src="deck.js?v=1784730629"></script>
<script>
(function(){
  "use strict";
  var P       = new URLSearchParams(location.search);
  var REVIEW  = P.get("script") === "1";
  var DECK    = P.get("deck") || "main";
  var stage   = document.getElementById("stage");
  var review  = document.getElementById("review");
  var idx     = 0;

  function fail(msg){ document.body.innerHTML = '<div id="err">' + msg + "</div>"; }
  if (!window.DECKS){ return fail("deck.js לא נטען. הרץ python3 _build/build.py"); }

  var q = REVIEW ? "?script=1" : "";

  var SLIDES = (DECKS[DECK]||{}).slides;
  if (!SLIDES || !SLIDES.length) return fail("אין שקפים במצגת «" + DECK + "».");
  document.body.className = REVIEW ? "review" : "present";

  if (DECK !== "main"){
    var tm = document.getElementById("tomain");
    tm.hidden = false;
    tm.href = "index.html" + q;
  }

  function fit(){
    var f = stage.querySelector("iframe");
    if (f) f.style.transform = "scale(" + (stage.clientWidth / 1920) + ")";
  }
  addEventListener("resize", fit);

  function zone(id, glyph, step){
    var d = document.createElement("div");
    d.className = "zone"; d.id = id;
    d.innerHTML = '<span class="hint">' + glyph + "</span>";
    d.onclick = function(){ show(idx + step); };
    return d;
  }

  /* the bar fades out of the way, and comes back the moment the mouse moves */
  var idleTimer;
  function wake(){
    document.body.classList.remove("idle");
    clearTimeout(idleTimer);
    idleTimer = setTimeout(function(){ document.body.classList.add("idle"); }, 3000);
  }
  addEventListener("mousemove", wake);
  addEventListener("keydown", wake);

  function linkHref(L){
    return "index.html" + (q ? q + "&" : "?") + "deck=" + L.target;
  }

  function renderReview(s){
    if (!REVIEW){ review.innerHTML = ""; return; }
    /* the deck links used to be repeated here; the bar now carries them in both
       modes, and two identical strips stacked on top of each other read as clutter */
    var html = "";
    var sc = window.SCRIPTS && SCRIPTS[s.id];
    if (sc){
      html += '<details class="sc" open><summary>מה אני אומר בשקף הזה' +
              '<span class="n">' + sc.lines.length + " שורות</span></summary>" +
              '<div class="scbody">';
      /* red is for what changes what he says. Everything else — provenance,
         verification, delivery coaching — sits folded away underneath. */
      if (sc.warn) html += '<p class="warn"><b>שים לב:</b> ' + sc.warn + "</p>";
      if (sc.notes) html += '<details class="notes"><summary>רקע ואימות</summary>' +
                            "<div>" + sc.notes + "</div></details>";
      html += '<div class="lines">' +
              sc.lines.map(function(l){ return "<p>" + l + "</p>"; }).join("") +
              "</div></div></details>";
    } else {
      html += '<details class="sc"><summary>אין עדיין סקריפט לשקף הזה' +
              '<span class="n">חסר</span></summary></details>';
    }
    review.innerHTML = html;
  }

  /* ---------- the menu: decks on the right, that deck's slides on the left ---------- */
  var mdecks = document.getElementById("mdecks");
  var mslides = document.getElementById("mslides");
  var browsing = DECK;                       /* which deck the left pane is showing */

  function buildDecks(){
    var core = "", backup = "";
    Object.keys(DECKS).forEach(function(dk){
      var d = DECKS[dk];
      if (!d.slides.length) return;
      var row = '<a data-deck="' + dk + '" class="' + (d.kind === "core" ? "core" : "") +
                '"><span class="mt">' + d.label + "</span>" +
                '<span class="cnt">' + d.slides.length + "</span></a>";
      if (d.kind === "core") core += row; else backup += row;
    });
    mdecks.innerHTML = '<div class="grp">The defence</div>' + core +
                       '<div class="grp">Backup decks A&ndash;K</div>' + backup;
    mdecks.querySelectorAll("a").forEach(function(a){
      a.onclick = function(){ browsing = a.dataset.deck; buildSlides(); markMenu(); };
    });
  }

  function buildSlides(){
    var d = DECKS[browsing];
    var h = '<div class="grp">' + d.label + " &middot; " + d.slides.length + " slides</div>";
    d.slides.forEach(function(s, i){
      h += '<a data-i="' + i + '">' +
           '<span class="mn">' + (i + 1) + "</span>" +
           (s.role ? '<span class="mr">' + s.role + "</span>" : "") +
           '<span class="mt">' + s.title + "</span></a>";
    });
    mslides.innerHTML = h;
    mslides.querySelectorAll("a").forEach(function(a){
      a.onclick = function(){
        var i = +a.dataset.i;
        if (browsing === DECK){ show(i); toggleMenu(false); }
        else location.href = "index.html" + (q ? q + "&" : "?") + "deck=" + browsing +
                             "#" + DECKS[browsing].slides[i].id;
      };
    });
  }

  function toggleMenu(on){
    document.body.classList.toggle("menuopen",
      on === undefined ? !document.body.classList.contains("menuopen") : on);
    markMenu();
  }

  function markMenu(){
    mdecks.querySelectorAll("a").forEach(function(a){
      a.classList.toggle("on", a.dataset.deck === DECK);
      a.classList.toggle("cur", a.dataset.deck === browsing);
    });
    mslides.querySelectorAll("a").forEach(function(a){
      a.classList.toggle("on", browsing === DECK && +a.dataset.i === idx);
    });
  }

  function buildMenu(){ buildDecks(); buildSlides(); markMenu(); }

  function show(i){
    idx = Math.max(0, Math.min(SLIDES.length - 1, i));
    var s = SLIDES[idx];
    stage.innerHTML = "";
    var f = document.createElement("iframe");
    f.setAttribute("scrolling", "no");
    f.src = s.path + (window.BUILD ? "?v=" + BUILD : "");
    f.onload = fit;
    stage.appendChild(f);
    stage.appendChild(zone("zprev", "‹", -1));
    stage.appendChild(zone("znext", "›", +1));
    fit();
    document.getElementById("pos").textContent = (idx + 1) + " / " + SLIDES.length;
    document.getElementById("ttl").textContent = s.title || "";
    var r = document.getElementById("role");
    if (s.role){ r.textContent = s.role; r.hidden = false; } else { r.hidden = true; }
    history.replaceState(null, "", location.pathname + location.search + "#" + s.id);
    var jw = document.getElementById("jumps");
    jw.innerHTML = (s.links || []).filter(function(L){ return DECKS[L.target]; })
      .map(function(L){
        return '<a href="' + linkHref(L) + '" title="' + L.label + '">' +
               "<b>" + (L.key || "\u2192") + "</b>" + L.label + "</a>";
      }).join("");
    jw.scrollLeft = 0;
    jumpEdges();
    requestAnimationFrame(jumpEdges);   // widths settle a frame after innerHTML
    renderReview(s);
    markMenu();
    wake();
    if (idx + 1 < SLIDES.length){
      var l = document.createElement("link");
      l.rel = "prefetch"; l.href = SLIDES[idx + 1].path + (window.BUILD ? "?v=" + BUILD : "");
      document.head.appendChild(l);
    }
  }

  /* The deck links live on one scrolling line. Fade whichever edge still hides
     something, so it is obvious there is more than the row can show. */
  function jumpEdges(){
    var jw = document.getElementById("jumps");
    var slack = jw.scrollWidth - jw.clientWidth;
    var at = Math.abs(jw.scrollLeft);
    jw.classList.toggle("more-e", slack > 2 && at < slack - 2);
    jw.classList.toggle("more-s", slack > 2 && at > 2);
  }
  (function(){
    var jw = document.getElementById("jumps");
    jw.addEventListener("scroll", jumpEdges, {passive:true});
    // a plain wheel over the row should move it sideways, not scroll the page
    jw.addEventListener("wheel", function(ev){
      if (Math.abs(ev.deltaY) <= Math.abs(ev.deltaX)) return;
      if (jw.scrollWidth <= jw.clientWidth) return;
      jw.scrollLeft += ev.deltaY; ev.preventDefault();
    }, {passive:false});
    addEventListener("resize", function(){ requestAnimationFrame(jumpEdges); });
    // a window resize is not the only thing that changes the row's width
    if (window.ResizeObserver) new ResizeObserver(jumpEdges).observe(jw);
  })();

  function toggleScript(){
    var p = new URLSearchParams(location.search);
    if (REVIEW) p.delete("script"); else p.set("script", "1");
    location.search = p.toString();
  }

  document.getElementById("next").onclick = function(){ show(idx + 1); };
  document.getElementById("prev").onclick = function(){ show(idx - 1); };
  document.getElementById("menubtn").onclick = function(){ toggleMenu(); };
  document.getElementById("modebtn").onclick = toggleScript;

  addEventListener("keydown", function(ev){
    if (ev.key === "ArrowRight" || ev.key === "PageDown"){ show(idx + 1); ev.preventDefault(); }
    else if (ev.key === "ArrowLeft" || ev.key === "PageUp"){ show(idx - 1); ev.preventDefault(); }
    else if (ev.key === "Home"){ show(0); ev.preventDefault(); }
    else if (ev.key === "End"){ show(SLIDES.length - 1); ev.preventDefault(); }
    else if (ev.key === "m" || ev.key === "M"){ toggleMenu(); }
    else if (ev.key === "Escape"){ toggleMenu(false); }
    /* S switches the script on and off. No button in the exam link, so the
       examiners never see the affordance — but it is always one key away. */
    else if (ev.key === "s" || ev.key === "S"){ toggleScript(); }
    else if (ev.key === "f" || ev.key === "F"){
      if (document.fullscreenElement) document.exitFullscreen();
      else document.documentElement.requestFullscreen();
    }
  });

  var start = 0;
  var want = decodeURIComponent(location.hash.replace(/^#/, ""));
  if (want){
    var k = SLIDES.findIndex(function(s){ return s.id === want; });
    if (k >= 0) start = k;
  }

  buildMenu();

  if (REVIEW){
    var t = document.createElement("script");
    t.src = "scripts.js?v=" + (window.BUILD || "");
    t.onload = t.onerror = function(){ show(start); };
    document.head.appendChild(t);
  } else {
    show(start);
  }
})();
</script>
</body>
</html>
